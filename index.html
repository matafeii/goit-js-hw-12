<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/goit-js-hw-12/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Image Search App</title>
    <script type="module" crossorigin src="/goit-js-hw-12/index.js"></script>
    <link rel="modulepreload" crossorigin href="/goit-js-hw-12/assets/vendor-SA7bT8CU.js">
    <link rel="stylesheet" crossorigin href="/goit-js-hw-12/assets/vendor-Dr4k8ETB.css">
    <link rel="stylesheet" crossorigin href="/goit-js-hw-12/assets/styles-CzfAV2Ig.css">
  </head>
  <body>
    <main>
      <section class="search-section">
        <form class="form" id="search-form">
          <input
            type="text"
            name="search-text"
            class="search-input"
            placeholder="Search images..."
            required
          />
          <button type="submit" class="search-button">Search</button>
        </form>
      </section>

      <section class="gallery-section">
        <ul class="gallery"></ul>
        <div class="load-more-section">
          <button class="load-more" type="button">Load more</button>
          <div class="loader-wrapper">
            <span class="loader"></span>
          </div>
        </div>
      </section>
    </main>

  </body>
